<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d0d1f 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .password-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .card-header h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .card-header p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }

    .input-container {
      position: relative;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      height: 60px;
      padding: 0 24px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      outline: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 2px;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0;
      font-weight: 400;
    }

    input:focus {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.08);
      box-shadow:
        0 0 0 4px rgba(99, 102, 241, 0.15),
        0 0 40px rgba(99, 102, 241, 0.1);
    }

    .line {
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
      transition: .3s;
    }

    .line::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
        background-color 0.4s ease;
      box-shadow: 0 0 20px currentColor;
    }

    .strength-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .strength-labels span {
      color: rgba(255, 255, 255, 0.3);
      transition: color 0.3s ease;
    }

    .strength-labels span.active {
      color: rgba(255, 255, 255, 0.8);
    }




    .developer {
      position: absolute;
      right: 40px;
      bottom: 35px;
      z-index: 999;
    }

    .developer-card {

      width: 170px;
      height: 170px;

      position: relative;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Glow */

    .glow {

      position: absolute;
      inset: 0;

      border-radius: 50%;

      background: rgba(99, 102, 241, .18);

      filter: blur(35px);

      transition: .6s;
    }

    /* Orbit */

    .orbit {

      position: absolute;

      inset: 0;

      border-radius: 50%;

      border: 1px solid rgba(99, 102, 241, .25);

      transition: .5s;
    }

    /* Profile */

    .profile {

      width: 110px;
      height: 110px;

      border-radius: 50%;

      overflow: hidden;

      border: 3px solid #6366f1;

      box-shadow:
        0 0 20px rgba(99, 102, 241, .4);

      transition: .5s;

      z-index: 5;
    }

    .profile img {

      width: 100%;
      height: 100%;

      object-fit: cover;

      transition: .5s;
    }

    /* Social Icons */

    .orbit a {

      width: 42px;
      height: 42px;

      border-radius: 50%;

      position: absolute;

      display: flex;
      justify-content: center;
      align-items: center;

      background: rgba(20, 20, 40, .95);

      backdrop-filter: blur(15px);

      border: 1px solid rgba(255, 255, 255, .12);

      color: white;

      font-size: 20px;

      text-decoration: none;

      opacity: 0;

      transform: scale(.2);

      transition: .45s;
    }

    .github {

      top: -20px;
      left: 50%;

      transform: translateX(-50%) scale(.2);
    }

    .linkedin {

      right: -20px;
      top: 50%;

      transform: translateY(-50%) scale(.2);
    }

    .instagram {

      left: 50%;
      bottom: -20px;

      transform: translateX(-50%) scale(.2);
    }

    .github:hover {

      color: #a5b4fc;
    }

    .linkedin:hover {

      color: #38bdf8;
    }

    .instagram:hover {

      color: #ec4899;
    }


    .developer-text {

      position: absolute;

      top: -40px;

      text-align: center;

      opacity: 0;

      transform: translateY(10px);

      transition: .4s;
    }

    .developer-text span {

      color: #a5b4fc;

      text-transform: uppercase;

      letter-spacing: 4px;

      font-size: 10px;
    }

    .developer-text h3 {

      margin-top: 6px;

      color: white;

      font-size: 16px;

      font-weight: 600;

      white-space: nowrap;
    }


    .developer-card:hover .orbit {
      animation: orbitRotate 8s linear infinite;
    }

    .developer-card:hover .profile {
      transform: scale(1.12);
    }

    .developer-card:hover .profile img {
      transform: scale(1.08);
    }

    .developer-card:hover .glow {
      transform: scale(1.3);
      background: rgba(99, 102, 241, .3);
    }

    .developer-card:hover .orbit a {
      opacity: 1;
    }

    .developer-card:hover .github {
      transform: translateX(-50%) scale(1);
    }

    .developer-card:hover .linkedin {
      transform: translateY(-50%) scale(1);
    }

    .developer-card:hover .instagram {
      transform: translateX(-50%) scale(1);
    }

    .developer-card:hover .developer-text {
      opacity: 1;
      transform: translateY(0);
    }


    @keyframes orbitRotate {

      from {

        transform: rotate(0deg);
      }

      to {

        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="password-card">
    <div class="card-header">
      <h1>Create Password</h1>
      <p>Enter a strong password to secure your account</p>
    </div>
    <div class="input-container">
      <input type="text" placeholder="Type your password...">
    </div>
    <div class="line"></div>
    <div class="strength-labels">
      <span>Weak</span>
      <span>Fair</span>
      <span>Good</span>
      <span>Strong</span>
    </div>
  </div>




  <footer class="developer">

    <div class="developer-card">

      <div class="glow"></div>

      <div class="orbit">

        <a href="https://github.com/FatemehSooki" target="_blank" class="github">
          <i class="bi bi-github"></i>
        </a>

        <a href="https://www.linkedin.com/in/fatemeh-sooki-197060396" target="_blank" class="linkedin">
          <i class="bi bi-linkedin"></i>
        </a>

        <a href="https://www.instagram.com/fatemeh_sooki" target="_blank" class="instagram">
          <i class="bi bi-instagram"></i>
        </a>

      </div>

      <div class="developer-text">

        <span>Developed By</span>

        <h3>Fatemeh Sooki</h3>

      </div>

      <div class="profile">

        <img src="5823194412169760388.jpg" alt="Developer">

      </div>


    </div>

  </footer>
</body>
<script>
  const inp = document.querySelector('input')
  const line = document.querySelector('.line')
  inp.addEventListener('input', () => {
    let temp = inp.value
    let score = 0
    if (temp.search(/[0-9]/) >= 0) score++
    if (temp.search(/[a-z]/) >= 0) score++
    if (temp.search(/[A-Z]/) >= 0) score++
    if (temp.search(/[!@#$%^&*_-]/) >= 0) score++
    if (temp.length >= 8) score++
    switch (score) {
      case 0: line.style.width = '0%'; line.style.backgroundColor = 'black'; break;
      case 1: line.style.width = '20%'; line.style.backgroundColor = 'red'; break;
      case 2: line.style.width = '40%'; line.style.backgroundColor = 'orange'; break;
      case 3: line.style.width = '60%'; line.style.backgroundColor = 'yellow'; break;
      case 4: line.style.width = '80%'; line.style.backgroundColor = 'green'; break;
      case 5: line.style.width = '100%'; line.style.backgroundColor = 'darkgreen'; break;
    }
  })
</script>

</html>
